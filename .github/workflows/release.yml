name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild + zig (Linux musl)
        if: runner.os == 'Linux'
        run: |
          python3 -m venv "$RUNNER_TEMP/ziglang"
          "$RUNNER_TEMP/ziglang/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/ziglang/bin/python" -m pip install ziglang
          echo "$RUNNER_TEMP/ziglang/bin" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild --locked

      - name: Cache cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build release binary (Linux)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --locked --target "${{ matrix.target }}"

      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          archive="artifacts/ferrite-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$archive" -C "target/${TARGET}/release" ferrite
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
          ls -lh "$archive"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ferrite-${{ matrix.target }}
          path: artifacts/*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(artifacts/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          flags=()
          if [[ "$VERSION" == *-* ]]; then
            flags+=(--prerelease)
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${files[@]}" --clobber
          else
            gh release create "$VERSION" "${files[@]}" \
              --title "$VERSION" \
              --generate-notes \
              "${flags[@]}"
          fi
