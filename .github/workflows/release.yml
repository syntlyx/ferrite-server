name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Linux musl targets
        run: rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Install cargo-zigbuild + zig
        run: |
          python3 -m venv "$RUNNER_TEMP/ziglang"
          "$RUNNER_TEMP/ziglang/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/ziglang/bin/python" -m pip install ziglang
          echo "$RUNNER_TEMP/ziglang/bin" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild --locked

      - name: Cache cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-musl-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-musl-cargo-

      - name: Build and package Linux musl archives
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            cargo zigbuild --release --all-features --locked --target "$target"
            archive="artifacts/ferrite-${VERSION}-${target}.tar.gz"
            tarball="${archive%.gz}"
            # The archive contains a single `ferrite` binary at the root.
            # Both install.sh and the self-updater (updater/server.rs) rely on this layout.
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime="@0" \
              -cf "$tarball" -C "target/${target}/release" ferrite
            gzip -n -f "$tarball"
          done
          ls -lh artifacts

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(artifacts/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          flags=()
          if [[ "$VERSION" == *-* ]]; then
            flags+=(--prerelease)
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${files[@]}" --clobber
          else
            gh release create "$VERSION" "${files[@]}" \
              --title "$VERSION" \
              --notes "" \
              "${flags[@]}"
          fi
